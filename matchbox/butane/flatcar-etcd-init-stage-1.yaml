---
variant: flatcar
version: 1.1.0

passwd:
  users:
    - name: core
      ssh_authorized_keys:
        - ${ssh_authorized_key}

storage:
  directories:
    - path: /etc/kubernetes
      mode: 0755
      user:
        name: root
      group:
        name: root
    - path: /etc/kubernetes/pki
      mode: 0755
      user:
        name: root
      group:
        name: root

  files:
    # /etc/hostname
    - path: /etc/hostname
      contents:
        inline: ${HOSTNAME}
    # /etc/systemd/network/00-${INTERFACE}.network
    - path: /etc/systemd/network/00-${INTERFACE}.network
      contents:
        inline: |
          [Match]
          Name=${INTERFACE}

          [Network]
          DNS=${DNS}
          Address=${IP}/${CIDR}
          Gateway=${GATEWAY}
    - path: /etc/kubernetes/pki/ca.crt
      mode: 0644
      contents:
        inline: |
          ${indent(10, KUBERNETES_CA_CRT)}
    - path: /etc/kubernetes/pki/ca.key
      mode: 0600
      contents:
        inline: |
          ${indent(10, KUBERNETES_CA_KEY)}
    # /etc/keepalived/check_apiserver.sh
    - path: /etc/keepalived/check_apiserver.sh
      mode: 0755
      contents:
        inline: |
          #!/bin/bash
          curl --silent --max-time 2 --insecure https://localhost:6443/healthz -o /dev/null || exit 1
    # /etc/keepalived/keepalived.conf
    - path: /etc/keepalived/keepalived.conf
      mode: 0644
      contents:
        inline: |
          ! /etc/keepalived/keepalived.conf
          ! Configuration File for keepalived
          global_defs {
            router_id LVS_DEVEL
          }
          vrrp_script check_apiserver {
            script "/etc/keepalived/check_apiserver.sh"
            interval 3
            weight -2
            fall 10
            rise 2
          }
          vrrp_instance VI_1 {
            state MASTER
            interface ${INTERFACE}
            virtual_router_id 51
            priority ${KEEPALIVED_PRIORITY}
            authentication {
              auth_type PASS
              auth_pass ${KEEPALIVED_PASSWORD}
            }
            virtual_ipaddress {
              ${HA_IP}/${CIDR}
            }
            track_script {
              check_apiserver
            }
          }
    - path: /etc/haproxy/haproxy.cfg
      contents:
        inline: |
          global
            log stdout format raw local0
            daemon

          defaults
            mode                    http
            log                     global
            option                  httplog
            option                  dontlognull
            option http-server-close
            option forwardfor       except 127.0.0.0/8
            option                  redispatch
            retries                 1
            timeout http-request    10s
            timeout queue           20s
            timeout connect         5s
            timeout client          35s
            timeout server          35s
            timeout http-keep-alive 10s
            timeout check           10s

          frontend apiserver
            bind ${HA_IP}:6444
            mode tcp
            option tcplog
            default_backend apiserverbackend

          backend apiserverbackend
            mode tcp
            balance     roundrobin

            ${indent(12, HAPROXY_CFG_BACKEND)}
    # noop
    - path: /etc/sysupdate.d/noop.conf
      contents:
        source: https://extensions.flatcar.org/extensions/noop.conf
    # k8s
    - path: /opt/extensions/kubernetes/kubernetes-v${KUBERNETES_VERSION}-x86-64.raw
      contents:
        source: https://extensions.flatcar.org/extensions/kubernetes-v${KUBERNETES_VERSION}-x86-64.raw
    - path: /etc/sysupdate.kubernetes.d/kubernetes-v${KUBERNETES_CONFIG}.conf
      contents:
        source: https://extensions.flatcar.org/extensions/kubernetes/kubernetes-v${KUBERNETES_CONFIG}.conf
    # cilium
    - path: /opt/extensions/cilium/cilium-v${CILIUM_VERSION}-x86-64.raw
      contents:
        source: https://extensions.flatcar.org/extensions/cilium-v${CILIUM_VERSION}-x86-64.raw
    - path: /etc/sysupdate.cilium.d/cilium.conf
      contents:
        source: https://extensions.flatcar.org/extensions/cilium.conf
    # keepalived
    - path: /opt/extensions/keepalived/keepalived-v${KEEPALIVED_VERSION}-x86-64.raw
      contents:
        source: https://extensions.flatcar.org/extensions/keepalived-v${KEEPALIVED_VERSION}-x86-64.raw
    - path: /etc/sysupdate.keepalived.d/keepalived.conf
      contents:
        source: https://extensions.flatcar.org/extensions/keepalived.conf
  links:
    - path: /etc/extensions/kubernetes.raw
      target: /opt/extensions/kubernetes/kubernetes-v${KUBERNETES_VERSION}-x86-64.raw
      hard: false
    - path: /etc/extensions/cilium.raw
      target: /opt/extensions/cilium/cilium-v${CILIUM_VERSION}-x86-64.raw
      hard: false
    - target: /opt/extensions/keepalived/keepalived-v${KEEPALIVED_VERSION}-x86-64.raw
      path: /etc/extensions/keepalived.raw
      hard: false

systemd:
  units:
    - name: locksmithd.service
      mask: true
    - name: systemd-sysupdate.timer
      enabled: true
    - name: systemd-sysupdate.service
      dropins:
        - name: kubernetes.conf
          contents: |
            [Service]
            ExecStartPre=/usr/bin/sh -c "readlink --canonicalize /etc/extensions/kubernetes.raw > /tmp/kubernetes"
            ExecStartPre=/usr/lib/systemd/systemd-sysupdate -C kubernetes update
            ExecStartPost=/usr/bin/sh -c "readlink --canonicalize /etc/extensions/kubernetes.raw > /tmp/kubernetes-new"
            ExecStartPost=/usr/bin/sh -c "if ! cmp --silent /tmp/kubernetes /tmp/kubernetes-new; then touch /run/reboot-required; fi"
        - name: cilium.conf
          contents: |
            [Service]
            ExecStartPre=/usr/bin/sh -c "readlink --canonicalize /etc/extensions/cilium.raw > /tmp/cilium"
            ExecStartPre=/usr/lib/systemd/systemd-sysupdate -C cilium update
            ExecStartPost=/usr/bin/sh -c "readlink --canonicalize /etc/extensions/cilium.raw > /tmp/cilium-new"
            ExecStartPost=/usr/bin/sh -c "if ! cmp --silent /tmp/cilium /tmp/cilium-new; then touch /run/reboot-required; fi"
        - name: keepalived.conf
          contents: |
            [Service]
            ExecStartPre=/usr/bin/sh -c "readlink --canonicalize /etc/extensions/keepalived.raw > /tmp/keepalived"
            ExecStartPre=/usr/lib/systemd/systemd-sysupdate -C keepalived update
            ExecStartPost=/usr/bin/sh -c "readlink --canonicalize /etc/extensions/keepalived.raw > /tmp/keepalived-new"
            ExecStartPost=/usr/bin/sh -c "if ! cmp --silent /tmp/keepalived /tmp/keepalived-new; then touch /run/reboot-required; fi"

    - name: kubeadm.service
      enabled: true
      contents: |
        [Unit]
        Description=Kubeadm service
        Requires=containerd.service
        After=containerd.service
        After=network-online.target
        ConditionPathExists=!/etc/kubernetes/kubelet.conf
        [Service]
        ExecStartPre=/usr/bin/kubeadm init \
                      --skip-phases=addon/kube-proxy \
                      --upload-certs \
                      --control-plane-endpoint ${HA_IP}:6443 \
                      --token ${KUBERNETES_TOKEN} \
                      --certificate-key ${KUBERNETES_CERTIFICATE_KEY}
        ExecStartPre=/usr/bin/mkdir /home/core/.kube
        ExecStartPre=/usr/bin/cp /etc/kubernetes/admin.conf /home/core/.kube/config
        ExecStart=/usr/bin/chown -R core:core /home/core/.kube
        [Install]
        WantedBy=multi-user.target
    - name: keepalived.service
      enabled: true
    - name: haproxy.service
      enabled: true
      contents: |
        [Unit]
        Description=The Reliable, High Performance TCP/HTTP Load Balancer
        After=docker.service keepalived.service
        Requires=docker.service keepalived.service
        [Service]
        ExecStart=/usr/bin/docker run \
                  --name haproxy \
                  --net=host \
                  --rm \
                  -v /etc/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro \
                  haproxy:alpine
        ExecStop=/usr/bin/docker stop haproxy
        [Install]
        WantedBy=multi-user.target
