---
variant: flatcar
version: 1.1.0

passwd:
  users:
    - name: core
      ssh_authorized_keys:
        - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOpw3cIAdtWOYUkb6UOAIcLuRzItoo4oZMzr/hzZYq4E openpgp:0xFAAA0172

storage:
  files:
    - path: /etc/systemd/network/00-eth0.network
      contents:
        inline: |
          [Match]
          Name=eth0

          [Network]
          Address=192.168.100.254/24
          Gateway=192.168.100.1
          DNS=1.1.1.1 1.0.0.1 2606:4700:4700::1111 2606:4700:4700::1001

systemd:
  units:
    - name: matchbox.service
      enabled: true
      contents: |
        [Unit]
        Description=matchbox service
        After=docker.service
        Requires=docker.service
        [Service]
        ExecStartPre=/usr/bin/mkdir -p /etc/matchbox
        ExecStartPre=/usr/bin/mkdir -p /var/lib/matchbox
        ExecStartPre=/usr/bin/curl \
                     -L \
                     -o /tmp/matchbox-configs.tar.gz \
                     https://github.com/akpall/akpex/raw/refs/heads/master/matchbox/matchbox-configs.tar.gz
        ExecStartPre=/usr/bin/tar -xzvf /tmp/matchbox-configs.tar.gz -C /var/lib/matchbox
        ExecStartPre=/usr/bin/sh -c "cd /var/lib/matchbox && ./get-flatcar"
        ExecStart=/usr/bin/docker run \
                  --name matchbox \
                  --rm \
                  -v /var/lib/matchbox:/var/lib/matchbox:Z \
                  -p 8080:8080 \
                  quay.io/poseidon/matchbox \
                  -address=0.0.0.0:8080 \
                  -log-level=debug
        ExecStop=/usr/bin/docker stop matchbox
        [Install]
        WantedBy=multi-user.target
    - name: dnsmasq.service
      enabled: true
      contents: |
        [Unit]
        Description=matchbox service
        After=docker.service
        Requires=docker.service
        [Service]
        ExecStart=/usr/bin/docker run \
                  --name dnsmasq \
                  --rm \
                  --cap-add=NET_ADMIN \
                  --net=host \
                  quay.io/poseidon/dnsmasq:v0.5.0-47-g28ff327 \
                  -d \
                  -q \
                  --dhcp-range=192.168.100.254,proxy,255.255.255.0 \
                  --enable-tftp --tftp-root=/var/lib/tftpboot \
                  --dhcp-userclass=set:ipxe,iPXE \
                  --pxe-service=tag:#ipxe,x86PC,"PXE chainload to iPXE",undionly.kpxe \
                  --pxe-service=tag:ipxe,x86PC,"iPXE",http://192.168.100.254:8080/boot.ipxe \
                  --pxe-service=tag:#ipxe,X86-64_EFI,"PXE chainload to iPXE UEFI",ipxe.efi \
                  --pxe-service=tag:ipxe,X86-64_EFI,"iPXE UEFI",http:///192.168.100.254:8080/boot.ipxe \
                  --log-queries \
                  --log-dhcp \
                  --port=0
        ExecStop=/usr/bin/docker stop dnsmasq
        [Install]
        WantedBy=multi-user.target
